<svg width="1200" height="420" viewBox="0 0 1200 420" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Uddhav Jain systems student GitHub profile hero</title>
  <desc id="desc">Royal navy and cream animated console with database, audio waveform, agent nodes, and terminal motifs.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1200" y2="420" gradientUnits="userSpaceOnUse">
      <stop stop-color="#061128"/>
      <stop offset="0.48" stop-color="#0B1D4D"/>
      <stop offset="1" stop-color="#132C68"/>
    </linearGradient>
    <linearGradient id="goldStroke" x1="75" y1="36" x2="1125" y2="384" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7E7B0"/>
      <stop offset="0.45" stop-color="#F2D78A"/>
      <stop offset="1" stop-color="#8DB7FF"/>
    </linearGradient>
    <linearGradient id="panel" x1="92" y1="78" x2="1110" y2="354" gradientUnits="userSpaceOnUse">
      <stop stop-color="#10224F" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#071329" stop-opacity="0.94"/>
    </linearGradient>
    <linearGradient id="scan" x1="0" y1="0" x2="1200" y2="0" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7E7B0" stop-opacity="0"/>
      <stop offset="0.45" stop-color="#F7E7B0" stop-opacity="0.04"/>
      <stop offset="0.5" stop-color="#F7E7B0" stop-opacity="0.28"/>
      <stop offset="0.55" stop-color="#F7E7B0" stop-opacity="0.04"/>
      <stop offset="1" stop-color="#F7E7B0" stop-opacity="0"/>
    </linearGradient>
    <pattern id="grid" width="38" height="38" patternUnits="userSpaceOnUse">
      <path d="M38 0H0V38" stroke="#8DB7FF" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
    <filter id="glow" x="-50" y="-50" width="1300" height="520" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <style>
      .mono { font-family: ui-monospace, SFMono-Regular, Menlo, Monaco, Consolas, "Liberation Mono", "Courier New", monospace; }
      .sans { font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; }
      .dash { stroke-dasharray: 12 10; animation: flow 8s linear infinite; }
      .wave { stroke-dasharray: 930; stroke-dashoffset: 930; animation: draw 5.5s ease-in-out infinite; }
      .blink { animation: blink 1.1s steps(1) infinite; }
      .floatA { animation: floatA 5.5s ease-in-out infinite; }
      .floatB { animation: floatB 6.5s ease-in-out infinite; }
      .pulse { animation: pulse 2.6s ease-in-out infinite; transform-origin: center; }
      .scan { animation: scanMove 5.5s linear infinite; }
      @keyframes flow { to { stroke-dashoffset: -220; } }
      @keyframes draw { 0% { stroke-dashoffset: 930; opacity: .42; } 45%, 70% { stroke-dashoffset: 0; opacity: 1; } 100% { stroke-dashoffset: -930; opacity: .42; } }
      @keyframes blink { 0%, 52% { opacity: 1; } 53%, 100% { opacity: 0; } }
      @keyframes floatA { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(-8px); } }
      @keyframes floatB { 0%, 100% { transform: translateY(0); } 50% { transform: translateY(7px); } }
      @keyframes pulse { 0%, 100% { opacity: .58; transform: scale(1); } 50% { opacity: 1; transform: scale(1.12); } }
      @keyframes scanMove { from { transform: translateX(-1200px); } to { transform: translateX(1200px); } }
      @media (prefers-reduced-motion: reduce) {
        .dash, .wave, .blink, .floatA, .floatB, .pulse, .scan { animation: none; }
      }
    </style>
  </defs>

  <rect width="1200" height="420" rx="28" fill="url(#bg)"/>
  <rect width="1200" height="420" rx="28" fill="url(#grid)"/>
  <rect x="34" y="32" width="1132" height="356" rx="24" fill="#050B18" fill-opacity="0.22" stroke="url(#goldStroke)" stroke-width="2"/>
  <rect x="66" y="62" width="1068" height="296" rx="20" fill="url(#panel)" stroke="#F7E7B0" stroke-opacity="0.2"/>
  <rect class="scan" x="-1200" y="62" width="1200" height="296" fill="url(#scan)"/>

  <g opacity="0.82">
    <circle cx="101" cy="92" r="5" fill="#F06A6A"/>
    <circle cx="121" cy="92" r="5" fill="#F2D78A"/>
    <circle cx="141" cy="92" r="5" fill="#8DB7FF"/>
  </g>

  <g class="floatA">
    <rect x="86" y="122" width="308" height="184" rx="14" fill="#071329" fill-opacity="0.78" stroke="#8DB7FF" stroke-opacity="0.28"/>
    <text x="112" y="158" class="mono" fill="#F7E7B0" font-size="18" font-weight="700">$ ./db_scratch</text>
    <rect x="112" y="178" width="210" height="10" rx="5" fill="#8DB7FF" fill-opacity="0.28"/>
    <rect x="112" y="204" width="244" height="10" rx="5" fill="#F2D78A" fill-opacity="0.27"/>
    <rect x="112" y="230" width="178" height="10" rx="5" fill="#F7E7B0" fill-opacity="0.2"/>
    <text x="112" y="270" class="mono" fill="#8DB7FF" font-size="15">storage | query | tests</text>
    <rect class="blink" x="317" y="255" width="10" height="20" rx="2" fill="#F2D78A"/>
  </g>

  <g filter="url(#glow)">
    <text x="448" y="150" class="sans" fill="#F7E7B0" font-size="56" font-weight="850">Uddhav Jain</text>
    <text x="452" y="194" class="mono" fill="#8DB7FF" font-size="24" font-weight="700">// Systems Student</text>
    <text x="452" y="235" class="sans" fill="#F7E7B0" fill-opacity="0.84" font-size="20">Drexel CS | Philadelphia | building from first principles</text>
  </g>

  <g>
    <rect x="454" y="264" width="132" height="34" rx="17" fill="#F2D78A" fill-opacity="0.13" stroke="#F2D78A" stroke-opacity="0.4"/>
    <text x="477" y="286" class="mono" fill="#F7E7B0" font-size="13" font-weight="700">databases</text>
    <rect x="598" y="264" width="126" height="34" rx="17" fill="#8DB7FF" fill-opacity="0.13" stroke="#8DB7FF" stroke-opacity="0.4"/>
    <text x="624" y="286" class="mono" fill="#F7E7B0" font-size="13" font-weight="700">audio ML</text>
    <rect x="736" y="264" width="136" height="34" rx="17" fill="#F7E7B0" fill-opacity="0.1" stroke="#F7E7B0" stroke-opacity="0.35"/>
    <text x="762" y="286" class="mono" fill="#F7E7B0" font-size="13" font-weight="700">agents</text>
  </g>

  <g class="floatB">
    <rect x="895" y="96" width="196" height="96" rx="14" fill="#071329" fill-opacity="0.72" stroke="#F2D78A" stroke-opacity="0.28"/>
    <ellipse cx="993" cy="122" rx="58" ry="16" fill="#0B1D4D" stroke="#F2D78A" stroke-opacity="0.8"/>
    <path d="M935 122V160C935 169 961 176 993 176C1025 176 1051 169 1051 160V122" stroke="#F2D78A" stroke-opacity="0.75" stroke-width="2"/>
    <ellipse cx="993" cy="160" rx="58" ry="16" stroke="#F2D78A" stroke-opacity="0.72" stroke-width="2"/>
    <text x="944" y="151" class="mono" fill="#F7E7B0" font-size="14">storage</text>
  </g>

  <g>
    <path class="wave" d="M86 344C110 318 134 370 158 344C182 318 206 370 230 344C254 318 278 370 302 344C326 318 350 370 374 344C398 318 422 370 446 344C470 318 494 370 518 344C542 318 566 370 590 344C614 318 638 370 662 344C686 318 710 370 734 344C758 318 782 370 806 344C830 318 854 370 878 344" stroke="#8DB7FF" stroke-width="3" stroke-linecap="round"/>
    <text x="904" y="350" class="mono" fill="#8DB7FF" font-size="14">realtime audio signal</text>
  </g>

  <g class="dash" stroke="#F2D78A" stroke-opacity="0.5" stroke-width="2" stroke-linecap="round">
    <path d="M806 132C846 112 884 112 922 126"/>
    <path d="M810 194C850 224 902 221 944 180"/>
    <path d="M721 206C762 224 790 212 820 178"/>
  </g>
  <g>
    <circle class="pulse" cx="806" cy="132" r="9" fill="#8DB7FF"/>
    <circle class="pulse" cx="810" cy="194" r="9" fill="#F2D78A"/>
    <circle class="pulse" cx="721" cy="206" r="9" fill="#F7E7B0"/>
    <circle cx="944" cy="180" r="7" fill="#8DB7FF"/>
    <text x="706" y="245" class="mono" fill="#F7E7B0" font-size="14">agentic tool routing</text>
  </g>

  <path d="M66 322H1134" stroke="#F7E7B0" stroke-opacity="0.12"/>
  <text x="86" y="378" class="mono" fill="#F7E7B0" fill-opacity="0.72" font-size="13">profile://numbpun</text>
  <text x="1006" y="378" class="mono" fill="#F7E7B0" fill-opacity="0.72" font-size="13">royal systems mode</text>
</svg>
